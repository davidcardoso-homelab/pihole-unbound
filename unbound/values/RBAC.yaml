apiVersion: v1
kind: ServiceAccount
metadata:
  name: unbound-cronjob
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unbound-restart
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unbound-restart-binding
subjects:
  - kind: ServiceAccount
    name: unbound-cronjob
roleRef:
  kind: Role
  name: unbound-restart
  apiGroup: rbac.authorization.k8s.io